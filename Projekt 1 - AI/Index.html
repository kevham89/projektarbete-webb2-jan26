<!DOCTYPE html>
<html lang="sv" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webbutveckling 2 - Quiz</title>
    <script src="MyJS/jQuery_v4.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="MyCSS/style.css">
</head>
<body>

<div class="container py-5" style="max-width: 760px;">

    <!-- START SCREEN -->
    <div id="start-screen" class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="card-title mb-1">Webbutveckling 2 <span class="text-secondary fw-normal">// quiz</span></h1>
            <p class="text-secondary">Testa dig själv på kursens innehåll - JavaScript, DOM, jQuery, Bootstrap, AJAX och React.</p>

            <div id="topic-chips" class="mb-4 d-flex flex-wrap gap-2"></div>

            <button id="start-btn" class="btn btn-warning btn-lg" disabled>
                <span id="start-btn-spinner" class="spinner-border spinner-border-sm me-2" role="status"></span>
                <span id="start-btn-label">Laddar frågor...</span>
            </button>
            <div id="load-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="card shadow-sm d-none">
        <div class="card-body p-4">

            <div class="d-flex align-items-center gap-3 mb-3">
                <small id="progress-label" class="text-secondary text-nowrap">Fråga 1/30</small>
                <div class="progress flex-grow-1" style="height: 6px;">
                    <div id="progress-fill" class="progress-bar bg-warning" style="width: 0%"></div>
                </div>
                <small id="score-label" class="text-secondary text-nowrap">0 rätt</small>
            </div>

            <span id="cat-tag" class="badge rounded-pill text-bg-secondary mb-3">Kategori</span>

            <p id="question-text" class="fs-5 mb-4"></p>

            <div id="options-list" class="list-group mb-3"></div>

            <div id="feedback" class="alert d-none"></div>

            <div class="d-flex justify-content-end">
                <button id="next-btn" class="btn btn-warning d-none">Nästa &raquo;</button>
            </div>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="card shadow-sm d-none text-center">
        <div class="card-body p-4">
            <p class="text-secondary mb-1">Resultat</p>
            <div id="grade-letter" class="display-1 fw-bold text-warning">A</div>
            <p id="score-line" class="text-secondary font-monospace"></p>
            <p id="grade-desc" class="mx-auto mb-4" style="max-width: 480px;"></p>

            <div id="cat-breakdown" class="text-start mx-auto mb-4" style="max-width: 480px;"></div>

            <button id="retry-btn" class="btn btn-outline-warning">Försök igen</button>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="MyJS/MyJQ.js"></script>
</body>
</html>
